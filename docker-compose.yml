services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_KEY: "base64:CkbHwx7MKF/MZ7tcdS0aFa1UVzYWCpBadYNSfOX54IM="
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      REVERB_APP_ID: "844196"
      REVERB_APP_KEY: "rxlnysdfemaatrejm4z9"
      REVERB_APP_SECRET: "m4hccbl2khpcqpjkckjd"
      REVERB_HOST: "reverb"
      REVERB_PORT: "6001"
      REVERB_SCHEME: "http"

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    ports:
      - "6001:6001"
    environment:
      APP_ENV: local
      APP_KEY: "base64:CkbHwx7MKF/MZ7tcdS0aFa1UVzYWCpBadYNSfOX54IM="
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      REVERB_APP_ID: "844196"
      REVERB_APP_KEY: "rxlnysdfemaatrejm4z9"
      REVERB_APP_SECRET: "m4hccbl2khpcqpjkckjd"
      REVERB_HOST: "0.0.0.0"
      REVERB_PORT: "6001"
      REVERB_SCHEME: "http"
    command: php artisan reverb:start --host=0.0.0.0 --port=6001
    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_KEY: "base64:CkbHwx7MKF/MZ7tcdS0aFa1UVzYWCpBadYNSfOX54IM="
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      REVERB_APP_ID: "844196"
      REVERB_APP_KEY: "rxlnysdfemaatrejm4z9"
      REVERB_APP_SECRET: "m4hccbl2khpcqpjkckjd"
      REVERB_HOST: "reverb"
      REVERB_PORT: "6001"
      REVERB_SCHEME: "http"
    command: php artisan queue:work --sleep=3 --tries=3
    depends_on:
      - app
      - reverb

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

