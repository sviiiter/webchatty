services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_KEY: ""
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      APP_KEY: ""
      REVERB_HOST: "0.0.0.0"
      REVERB_PORT: 8080
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      - app

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  vendor:
